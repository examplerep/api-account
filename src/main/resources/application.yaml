# Keycloak (or any OIDC provider): bearer access tokens verified via realm discovery (JWKS).
# Set KEYCLOAK_SERVER_URL to your Keycloak base (no trailing slash), e.g. http://localhost:8180
# Set KEYCLOAK_REALM and KEYCLOAK_CLIENT_ID to match your realm and client.
quarkus:
  application:
    name: api-account
  banner:
    enabled: false
  datasource:
    db-kind: postgresql
  flyway:
    migrate-at-start: true
    locations: db/migration
  hibernate-orm:
    schema-management:
      strategy: none
  smallrye-openapi:
    path: /openapi
  swagger-ui:
    always-include: true
  http:
    auth:
      basic: false
  oidc:
    application-type: service
    auth-server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:api-account}
    client-id: ${KEYCLOAK_CLIENT_ID:api-account}
    # Keycloak realm roles are read from realm_access.roles by default; use groups if you map roles there:
    # roles:
    #   role-claim-path: groups

"%dev":
  quarkus:
    datasource:
      devservices:
        enabled: true
    flyway:
      locations: db/migration,db/testdata
    http:
      auth:
        basic: false

"%test":
  quarkus:
    datasource:
      devservices:
        enabled: true
    flyway:
      locations: db/migration,db/testdata
    http:
      auth:
        basic: false
    # No Keycloak required for unit tests; RBAC is exercised via @TestSecurity.
    oidc:
      enabled: false

"%prod":
  quarkus:
    flyway:
      locations: db/migration
    datasource:
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      jdbc:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:api_account}
